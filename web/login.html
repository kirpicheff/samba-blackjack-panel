<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samba Admin - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            letter-spacing: -0.025em;
        }
        .logo span { color: #3b82f6; }
        h1 { font-size: 1.25rem; margin-bottom: 0.5rem; font-weight: 600; }
        p { color: #94a3b8; font-size: 0.875rem; margin-bottom: 2rem; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.8);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #1d4ed8; }
        .error {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div style="position: absolute; top: 2rem; right: 2rem; display: flex; background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); padding: 4px; border-radius: 12px; gap: 4px; border: 1px solid rgba(255,255,255,0.1);">
        <button class="btn-action btn-outline lang-btn" onclick="setLanguage('ru')" style="padding: 4px 8px; height: 28px; font-size: 0.7rem; min-width: 32px; background: none; border: none; color: white; cursor: pointer; font-weight: 600;">RU</button>
        <button class="btn-action btn-outline lang-btn" onclick="setLanguage('en')" style="padding: 4px 8px; height: 28px; font-size: 0.7rem; min-width: 32px; background: none; border: none; color: white; cursor: pointer; font-weight: 600;">EN</button>
        <button class="btn-action btn-outline lang-btn" onclick="setLanguage('zh')" style="padding: 4px 8px; height: 28px; font-size: 0.7rem; min-width: 32px; background: none; border: none; color: white; cursor: pointer; font-weight: 600;">ZH</button>
        <button class="btn-action btn-outline lang-btn" onclick="setLanguage('es')" style="padding: 4px 8px; height: 28px; font-size: 0.7rem; min-width: 32px; background: none; border: none; color: white; cursor: pointer; font-weight: 600;">ES</button>
    </div>

    <div class="login-card">
        <div class="logo">SAMBA<span>ADMIN</span></div>
        <h1 data-i18n="login_welcome">Добро пожаловать</h1>
        <p data-i18n="login_subtitle">Введите данные администратора</p>
        <form id="login-form">
            <input type="text" id="username" placeholder="Логин" required autofocus data-i18n-placeholder="login_user_placeholder">
            <input type="password" id="password" placeholder="Пароль" required data-i18n-placeholder="login_pass_placeholder">
            <button type="submit" data-i18n="login_btn">Войти в панель</button>
        </form>
        <div id="error-msg" class="error" data-i18n="login_error">Неверный логин или пароль.</div>
    </div>

    <script>
        let i18n_data = {};
        let currentLang = localStorage.getItem('panel_lang') || 'ru';

        async function loadLanguage(lang) {
            if (i18n_data[lang]) return;
            const res = await fetch(`/locales/${lang}.json`);
            i18n_data[lang] = await res.json();
        }

        async function setLanguage(lang) {
            await loadLanguage(lang);
            currentLang = lang;
            localStorage.setItem('panel_lang', lang);
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n_data[lang][key] || key;
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                el.placeholder = i18n_data[lang][key] || key;
            });
            
            // Подсветка кнопок переключения языка
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const isMatch = btn.getAttribute('onclick').includes(`'${lang}'`);
                btn.style.background = isMatch ? 'rgba(255,255,255,0.2)' : 'transparent';
            });
        }

        (async () => {
            await loadLanguage(currentLang);
            setLanguage(currentLang);
        })();

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('panel_user', data.user);
                localStorage.setItem('panel_role', data.role);
                window.location.href = '/';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        };
    </script>
</body>
</html>
